<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BBTRS® Newsletter Signup</title>
  <style>
    :root {
      --bg-green: #2f5d4f;
      --ink: #f4efe6;
    }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg-green);
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .newsletter {
      width: 100%;
      max-width: 640px;
    }
    .newsletter h2 {
      font-size: 1.125rem;
      font-weight: 500;
      margin: 0 0 1rem;
    }
    .form-embed {
      width: 100%;
      height: 460px;
    }
  </style>
</head>
<body>
  <section class="newsletter">
    <h2>Stay connected with BBTRS® updates, free sessions, and resources.</h2>
    <iframe
      src="https://api.leadconnectorhq.com/widget/form/YrRAFDDvUs09jCvB8D8g"
      class="form-embed"
      style="width:100%;height:100%;border:none;border-radius:10px"
      id="inline-YrRAFDDvUs09jCvB8D8g"
      data-layout="{'id':'INLINE'}"
      data-trigger-type="alwaysShow"
      data-trigger-value=""
      data-activation-type="alwaysActivated"
      data-activation-value=""
      data-deactivation-type="neverDeactivate"
      data-deactivation-value=""
      data-form-name="Lead Capture | BBTRS® | Newsletter Signup"
      data-height="460"
      data-layout-iframe-id="inline-YrRAFDDvUs09jCvB8D8g"
      data-form-id="YrRAFDDvUs09jCvB8D8g"
      title="Lead Capture | BBTRS® | Newsletter Signup">
    </iframe>
    <script src="https://link.msgsndr.com/js/form_embed.js"></script>
  </section>
</body>
</html>
