<!--
  sticky-mobile-cta.html: Bottom-fixed CTA on mobile only.

  USE FOR: All long-form landing pages. Appears after the user has scrolled
           past the hero (IntersectionObserver trigger).

  DEPENDENCIES: base.html

  USAGE: Place near the bottom of <body>. The script hides it until the
         hero is out of view, then shows it on mobile only.
-->

<div id="sticky-mobile-cta"
     class="md:hidden"
     style="position:fixed;bottom:0;left:0;right:0;z-index:55;
            background:rgba(26,26,24,0.96);backdrop-filter:blur(8px);
            border-top:1px solid rgba(204,153,36,0.2);
            padding:12px 16px;
            transform:translateY(100%);
            transition:transform 0.3s cubic-bezier(0.4,0,0.2,1);">
  <div class="flex items-center gap-3">
    <div style="flex:1;">
      <p style="font-size:11px;color:rgba(255,255,255,0.6);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:2px;">
        [MOBILE_CTA_EYEBROW e.g. "Apply to the September cohort"]
      </p>
      <p style="font-size:14px;color:#fff;font-family:'Marcellus',Georgia,serif;">
        [MOBILE_CTA_DETAIL e.g. "From $499"]
      </p>
    </div>
    <a href="[PRIMARY_CTA_HREF]"
       class="btn-gold"
       style="font-size:11px;padding:12px 20px;flex-shrink:0;">
      [PRIMARY_CTA_LABEL_SHORT]
    </a>
  </div>
</div>

<script>
  (function() {
    const el = document.getElementById('sticky-mobile-cta');
    if (!el) return;
    // Show after scrolling 600px (past the hero)
    let shown = false;
    window.addEventListener('scroll', () => {
      if (window.scrollY > 600 && !shown) {
        el.style.transform = 'translateY(0)';
        shown = true;
      } else if (window.scrollY <= 400 && shown) {
        el.style.transform = 'translateY(100%)';
        shown = false;
      }
    }, { passive: true });
  })();
</script>
