<!--
  email-capture.html: Lead magnet / soft conversion block.

  USE FOR: Readers not ready to apply or book. Captures email in exchange for
           a free resource (breath guide, audio session, sample chapter).

  DEPENDENCIES: base.html

  USAGE: Place before the final CTA section, or between mid-page sections.
         Do not use on a page that already has an embedded application form
         (avoid form fatigue).

  FORM INTEGRATION: Replace the <form> action and method with your GHL /
                    Mailchimp / ConvertKit endpoint. The default behavior is
                    a stub that prevents submission.
-->

<section class="py-20" style="background:#f9f8f5;">
  <div class="max-w-3xl mx-auto px-6">
    <div class="lift-card" style="padding:48px 40px;background:#fff;border:1px solid #d3cdb3;">
      <div class="grid md:grid-cols-5 gap-10 items-center">
        <!-- Visual side -->
        <div class="md:col-span-2 text-center md:text-left">
          <div style="display:inline-flex;align-items:center;justify-content:center;width:64px;height:64px;border:1px solid rgba(204,153,36,0.3);border-radius:50%;margin-bottom:18px;background:rgba(204,153,36,0.05);">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#cc9924" stroke-width="1.5">
              <path d="M12 2v20M2 12h20M12 2a10 10 0 010 20M12 2a10 10 0 000 20" />
            </svg>
          </div>
          <p class="eyebrow mb-3">Not Ready Yet?</p>
          <h3 style="font-family:'Marcellus',Georgia,serif;font-size:24px;color:#1a1a18;line-height:1.3;letter-spacing:-0.01em;">
            Start with a free breath.
          </h3>
        </div>

        <!-- Copy + form -->
        <div class="md:col-span-3">
          <p style="font-size:15px;color:#4a4a46;line-height:1.7;margin-bottom:20px;">
            Leave your email and we will send you [LEAD_MAGNET_DESCRIPTION].
            Nothing else. Unsubscribe any time.
          </p>

          <form action="[FORM_ACTION_URL]" method="POST"
                class="flex flex-col sm:flex-row gap-3"
                onsubmit="return handleEmailCapture(event)">
            <label class="sr-only" for="email-capture-input">Email address</label>
            <input id="email-capture-input"
                   type="email"
                   name="email"
                   required
                   placeholder="your email"
                   style="flex:1;padding:14px 16px;border:1px solid #d3cdb3;background:#fff;font-family:'Roboto',sans-serif;font-weight:300;font-size:15px;color:#1a1a18;outline:none;transition:border-color 0.2s;"
                   onfocus="this.style.borderColor='#cc9924'"
                   onblur="this.style.borderColor='#d3cdb3'" />
            <button type="submit" class="btn-gold" style="font-size:12px;padding:14px 28px;">Send It</button>
          </form>

          <p style="font-size:12px;color:#c5c3c2;margin-top:10px;">
            We respond within 48 hours. No spam, ever.
          </p>
        </div>
      </div>
    </div>
  </div>
</section>

<script>
  function handleEmailCapture(e) {
    // Hook your GHL / Mailchimp integration here.
    // If submitting server-side, return true.
    // If using fetch, e.preventDefault() and call your API.
    return true;
  }
</script>
